<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>רוטר – סקופים</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spin 0.8s linear infinite;
    }
    .row-selected {
      background-color: rgb(239 246 255) !important;
      border-left: 4px solid rgb(37 99 235);
    }
    .title-cell {
      max-width: 320px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .tag-cell {
      width: 50px;
      text-align: center;
      white-space: nowrap;
    }
    #article-body img {
      max-width: 100%;
      height: auto;
      display: block;
      margin-top: 12px;
      margin-bottom: 12px;
    }
    #article-body a {
      color: blue;
      text-decoration: underline;
    }
    #article-body p {
      margin-bottom: 12px;
      line-height: 1.7;
    }
    #article-body br {
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">
  <header class="bg-gray-900 text-white px-4 py-3 flex items-center justify-between flex-shrink-0 z-20 shadow">
    <h1 class="text-lg font-bold">רוטר – סקופים</h1>
    <button
      id="refresh-btn"
      type="button"
      class="bg-gray-700 hover:bg-gray-600 px-4 py-1.5 rounded text-sm font-medium transition-colors"
    >
      רענן
    </button>
  </header>

  <div class="flex flex-1 min-h-0" dir="ltr">
    <aside class="w-[420px] flex-shrink-0 border-r border-gray-200 bg-white flex flex-col min-h-0" dir="rtl">
      <div class="p-3 flex-shrink-0">
        <p id="status" class="text-sm text-gray-500 hidden"></p>
      </div>

      <div id="loading" class="flex justify-center items-center flex-1 py-12">
        <div class="spinner w-10 h-10 border-4 border-gray-300 border-t-blue-600 rounded-full"></div>
      </div>

      <div id="error" class="hidden text-center py-12 px-4 text-red-600 font-medium flex-1"></div>

      <div id="table-wrap" class="hidden flex-1 overflow-y-auto min-h-0">
        <table class="w-full border-collapse text-sm table-fixed">
          <thead class="sticky top-0 z-10">
            <tr class="bg-gray-900 text-white">
              <th class="text-right px-3 py-2 font-semibold border-b border-gray-700">כותרות</th>
              <th class="tag-cell px-2 py-2 font-semibold border-b border-gray-700">תגובות</th>
            </tr>
          </thead>
          <tbody id="articles-body"></tbody>
        </table>
      </div>
    </aside>

    <section id="reader-panel" class="flex-1 min-h-0 overflow-y-auto bg-gray-50" dir="rtl">
      <div id="reader-empty" class="flex items-center justify-center h-full text-gray-400 text-lg">
        בחר כתבה מהרשימה
      </div>

      <div id="reader-loading" class="hidden flex items-center justify-center h-full">
        <div class="spinner w-10 h-10 border-4 border-gray-300 border-t-blue-600 rounded-full"></div>
      </div>

      <div id="reader-content" class="hidden p-6 max-w-3xl mx-auto">
        <h2 id="article-title" class="text-2xl font-bold mb-4"></h2>
        <div id="article-body" class="text-gray-800 leading-relaxed mb-6"></div>
        <hr class="border-gray-300 my-6">
        <h3 class="text-xl font-bold mb-4">תגובות</h3>
        <div id="talkbacks-list" class="space-y-3"></div>
      </div>
    </section>
  </div>

  <script>
    const BASE_URL = 'https://rotter.net';

    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const tableWrapEl = document.getElementById('table-wrap');
    const articlesBodyEl = document.getElementById('articles-body');
    const statusEl = document.getElementById('status');
    const refreshBtn = document.getElementById('refresh-btn');

    const readerEmptyEl = document.getElementById('reader-empty');
    const readerLoadingEl = document.getElementById('reader-loading');
    const readerContentEl = document.getElementById('reader-content');
    const articleTitleEl = document.getElementById('article-title');
    const articleBodyEl = document.getElementById('article-body');
    const talkbacksListEl = document.getElementById('talkbacks-list');

    let selectedRowEl = null;

    function resolveUrl(href) {
      if (!href || href.startsWith('javascript:') || href === '#') return null;
      if (href.startsWith('http://') || href.startsWith('https://')) return href;
      if (href.startsWith('/')) return BASE_URL + href;
      return BASE_URL + '/' + href;
    }

    function findTitleAnchor(cells) {
      for (let i = 0; i < Math.min(2, cells.length); i++) {
        const anchor = cells[i].querySelector('a[href]');
        if (anchor) return { cellIndex: i, anchor };
      }
      return null;
    }

    function findArticleUrl(row, anchor) {
      const fromAnchor = resolveUrl(anchor.getAttribute('href'));
      if (fromAnchor) return fromAnchor;

      for (const link of row.querySelectorAll('a[href]')) {
        const url = resolveUrl(link.getAttribute('href'));
        if (url) return url;
      }
      return null;
    }

    function isFullWidthRow(cells, tableColCount) {
      if (cells.length !== 1) return false;
      const colspan = parseInt(cells[0].getAttribute('colspan') || '1', 10);
      return colspan >= tableColCount || colspan >= 3;
    }

    function parseArticles(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const tables = doc.querySelectorAll('table');
      let bestArticles = [];

      for (const table of tables) {
        const colCount = Math.max(
          ...Array.from(table.querySelectorAll('tr')).map((row) => row.querySelectorAll(':scope > td, :scope > th').length),
          0
        );
        const articles = [];

        for (const row of table.querySelectorAll('tr')) {
          const cells = row.querySelectorAll(':scope > td');
          if (cells.length === 0) continue;
          if (isFullWidthRow(cells, colCount)) continue;

          const titleInfo = findTitleAnchor(cells);
          if (!titleInfo) continue;

          const { cellIndex, anchor } = titleInfo;
          const url = findArticleUrl(row, anchor);
          if (!url) continue;

          let title = anchor.textContent.replace(/\s+/g, ' ').trim();
          if (!title && cells[cellIndex + 1]) {
            title = cells[cellIndex + 1].textContent.replace(/\s+/g, ' ').trim();
          }
          if (!title) continue;
          if (title.length < 4) continue;
          if (['כותרות', 'הכותב', 'מכתב אחרון', 'תגובות', 'תג'].includes(title)) continue;
          if (['{', '}', '@media', 'width:', 'px;', '.forum', 'font-size'].some((s) => title.includes(s))) continue;

          const author = cells[cellIndex + 1]?.textContent.replace(/\s+/g, ' ').trim() || '';
          const lastPost = cells[cellIndex + 2]?.textContent.replace(/\s+/g, ' ').trim() || '';
          const tagNumber = cells[cellIndex + 3]?.textContent.replace(/\s+/g, ' ').trim() || '';

          articles.push({ title, url, author, lastPost, tagNumber });
        }

        if (articles.length > bestArticles.length) {
          bestArticles = articles;
        }
      }

      return bestArticles;
    }

    function extractArticleTitle(doc) {
      const byId = doc.getElementById('article-title');
      if (byId?.textContent.trim()) return byId.textContent.replace(/\s+/g, ' ').trim();

      const h1 = doc.querySelector('h1');
      if (h1?.textContent.trim()) return h1.textContent.replace(/\s+/g, ' ').trim();

      const headings = doc.querySelectorAll('h1, h2, h3, h4, h5, h6');
      let largest = '';
      for (const heading of headings) {
        const text = heading.textContent.replace(/\s+/g, ' ').trim();
        if (text.length > largest.length) largest = text;
      }
      return largest;
    }

    function looksLikeNavOrCommentTable(table) {
      const html = table.innerHTML.toLowerCase();
      if (html.includes('login') || html.includes('listforum') || html.includes('az=search')) return true;

      const rows = table.querySelectorAll('tr');
      if (rows.length <= 10) return false;

      let numberedRows = 0;
      for (const row of rows) {
        const first = row.querySelector('td');
        if (first && /^\d+$/.test(first.textContent.trim())) numberedRows++;
      }
      return numberedRows > 5;
    }

    function isInsideNavOrCommentTable(el) {
      let node = el.parentElement;
      while (node) {
        if (node.tagName === 'TABLE' && looksLikeNavOrCommentTable(node)) return true;
        node = node.parentElement;
      }
      return false;
    }

    function extractArticleBody(doc) {
      const clone = doc.cloneNode(true);
      clone.querySelectorAll('script, style, iframe, nav, header, footer').forEach((el) => el.remove());

      for (const td of clone.querySelectorAll('td')) {
        const text = td.textContent.replace(/\s+/g, ' ').trim();
        if (text.length > 150 && !isInsideNavOrCommentTable(td)) {
          let html = td.innerHTML;
          html = html.replaceAll('src="/', 'src="https://rotter.net/');
          html = html.replaceAll("src='/", "src='https://rotter.net/");
          html = html.replaceAll('href="/', 'href="https://rotter.net/');
          html = html.replaceAll("href='/", "href='https://rotter.net/");
          html = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
          return html;
        }
      }

      return '';
    }

    function extractTalkbacks(doc) {
      const talkbacks = [];
      const seen = new Set();

      for (const row of doc.querySelectorAll('tr')) {
        if (row.querySelector('th')) continue;

        const cells = Array.from(row.querySelectorAll(':scope > td'));
        if (cells.length < 3) continue;

        const cellTexts = cells
          .map((cell) => cell.textContent.replace(/\s+/g, ' ').trim())
          .filter(Boolean);
        if (cellTexts.length < 3) continue;

        let comment = '';
        let commentIdx = -1;
        for (let i = 0; i < cellTexts.length; i++) {
          if (cellTexts[i].length > comment.length) {
            comment = cellTexts[i];
            commentIdx = i;
          }
        }
        if (comment.length <= 15) continue;

        let username = '';
        for (let i = 0; i < cellTexts.length; i++) {
          if (i === commentIdx) continue;
          const text = cellTexts[i];
          if (text.length < 40 && !/^\d+$/.test(text)) {
            username = text;
            break;
          }
        }

        if (!username || comment === username) continue;

        const prefix = comment.slice(0, 80);
        if (seen.has(prefix)) continue;
        seen.add(prefix);

        talkbacks.push({ username, comment });
        if (talkbacks.length >= 200) break;
      }

      return talkbacks;
    }

    function parseArticlePage(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      return {
        title: extractArticleTitle(doc),
        body: extractArticleBody(doc),
        talkbacks: extractTalkbacks(doc),
      };
    }

    function formatFetchTime(date) {
      return date.toLocaleString('he-IL', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
      });
    }

    function highlightRow(rowEl) {
      if (selectedRowEl) selectedRowEl.classList.remove('row-selected');
      selectedRowEl = rowEl;
      rowEl.classList.add('row-selected');
    }

    function showReaderEmpty() {
      readerEmptyEl.classList.remove('hidden');
      readerLoadingEl.classList.add('hidden');
      readerContentEl.classList.add('hidden');
    }

    function showReaderLoading() {
      readerEmptyEl.classList.add('hidden');
      readerLoadingEl.classList.remove('hidden');
      readerContentEl.classList.add('hidden');
    }

    function showReaderArticle(title, body, talkbacks) {
      readerEmptyEl.classList.add('hidden');
      readerLoadingEl.classList.add('hidden');
      readerContentEl.classList.remove('hidden');

      articleTitleEl.textContent = title || 'ללא כותרת';
      articleBodyEl.innerHTML = body
        ? body
        : '<p class="text-gray-500">לא נמצא תוכן לכתבה.</p>';

      talkbacksListEl.innerHTML = '';
      if (talkbacks.length === 0) {
        talkbacksListEl.innerHTML = '<p class="text-gray-500">אין תגובות</p>';
        return;
      }

      for (const talkback of talkbacks) {
        const card = document.createElement('div');
        card.className = 'bg-white border border-gray-200 rounded-lg p-4 shadow-sm';
        card.innerHTML = `
          <div class="font-bold text-gray-900 mb-1">${escapeHtml(talkback.username)}</div>
          <div class="text-gray-700 whitespace-pre-wrap">${escapeHtml(talkback.comment)}</div>
        `;
        talkbacksListEl.appendChild(card);
      }
    }

    async function loadArticle(url, rowEl, listTitle) {
      highlightRow(rowEl);
      showReaderLoading();

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        const response = await fetch(
          `http://localhost:3001/article?url=${encodeURIComponent(url)}`,
          { signal: controller.signal }
        );
        clearTimeout(timeoutId);

        if (!response.ok) throw new Error(`שגיאת רשת (${response.status})`);

        const html = await response.text();
        if (!html) throw new Error('לא התקבל תוכן מהשרת');

        const { title, body, talkbacks } = parseArticlePage(html);
        const displayTitle = !title || title.length < 4 ? listTitle : title;
        showReaderArticle(displayTitle, body, talkbacks);
      } catch (err) {
        showReaderArticle('שגיאה', `שגיאה בטעינת הכתבה: ${err.message}`, []);
      }
    }

    function renderArticles(articles, fetchedAt) {
      articlesBodyEl.innerHTML = '';

      articles.forEach((article, index) => {
        const row = document.createElement('tr');
        row.className = [
          index % 2 === 0 ? 'bg-white' : 'bg-gray-100',
          'cursor-pointer hover:bg-blue-100 transition-colors border-b border-gray-200',
        ].join(' ');
        row.dataset.url = article.url;

        row.innerHTML = `
          <td class="title-cell px-3 py-2 font-medium">${escapeHtml(article.title)}</td>
          <td class="tag-cell px-2 py-2">${escapeHtml(article.tagNumber)}</td>
        `;

        row.addEventListener('click', () => loadArticle(article.url, row, article.title));
        articlesBodyEl.appendChild(row);
      });

      statusEl.textContent = `${articles.length} כתבות נטענו · עדכון אחרון: ${formatFetchTime(fetchedAt)}`;
      statusEl.classList.remove('hidden');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showLoading() {
      loadingEl.classList.remove('hidden');
      errorEl.classList.add('hidden');
      tableWrapEl.classList.add('hidden');
      statusEl.classList.add('hidden');
    }

    function showError(message) {
      loadingEl.classList.add('hidden');
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
      tableWrapEl.classList.add('hidden');
      statusEl.classList.add('hidden');
    }

    function showTable() {
      loadingEl.classList.add('hidden');
      errorEl.classList.add('hidden');
      tableWrapEl.classList.remove('hidden');
    }

    async function fetchScoops() {
      showLoading();
      refreshBtn.disabled = true;

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        const response = await fetch('http://localhost:3001/scoops', {
          signal: controller.signal,
        });
        clearTimeout(timeoutId);

        if (!response.ok) throw new Error(`שגיאת רשת (${response.status})`);

        const html = await response.text();
        if (!html) throw new Error('לא התקבל תוכן מהשרת');

        const articles = parseArticles(html);
        if (articles.length === 0) throw new Error('לא נמצאו כתבות בדף');

        renderArticles(articles, new Date());
        showTable();
      } catch (err) {
        showError(`שגיאה בטעינת הסקופים: ${err.message}`);
      } finally {
        refreshBtn.disabled = false;
      }
    }

    refreshBtn.addEventListener('click', fetchScoops);
    fetchScoops();
  </script>
</body>
</html>
